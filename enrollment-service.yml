server:
  port: 8002

spring:
  application:
    name: enrollment-service
  datasource:
    url: jdbc:mysql://localhost:3306/studentmanagementsystem
    username: root
    password: mayank1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true
    
management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,refresh,info
  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      studentValidate:
        base-config: default
      courseValidate:
        base-config: default
      getAllStudentsBreaker:
        base-config: default
      getAllCoursesBreaker:
        base-config: default
    configs:
      default:
        register-health-indicator: true
        event-consumer-buffer-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 6s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-type: count_based
        sliding-window-size: 10
  retry:
    instances:
      studentValidateRetry:
        base-config: default
      courseValidateRetry:
        base-config: default
      getAllCourseRetry:
        base-config: default
      getAllStudentRetry:
        base-config: default
    configs:
      default:
        max-attempts: 4
        wait-duration: 3s
        retry-exceptions: com.enrollmentservice.enrollmentservice.exception.ServiceUnavailableException
  timelimiter:
    instances:
      getAllCourseTimeout:
        base-config: default
      getAllStudentTimeout:
        base-config: default
      studentValidateTimeout:
        base-config: default
      courseValidateTimeout:
        base-config: default
    configs:
      default:
        timeout-duration: 5s
logging:
  level:
    io:
      github:
        resilience4j:
          retry: debug

